<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Host Entry Tool - AFC Northerners</title>
    <script src="draft-order-2026.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f0f0f; color: #eee; padding: 40px; }
        .card { background: #1a1a1a; border-radius: 8px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .grid-header { display: grid; grid-template-columns: 80px 100px 1fr 1fr 1fr 1fr; gap: 15px; font-weight: bold; padding: 10px; border-bottom: 2px solid #333; position: sticky; top: 0; background: #1a1a1a; }
        .pick-row { display: grid; grid-template-columns: 80px 100px 1fr 1fr 1fr 1fr; gap: 15px; padding: 10px; border-bottom: 1px solid #222; align-items: center; }
        input { background: #222; border: 1px solid #444; color: white; padding: 8px; border-radius: 4px; width: 90%; }
        input:focus { border-color: #d50a0a; outline: none; }
        .controls { margin-top: 30px; border-top: 2px solid #333; padding-top: 20px; }
        textarea { width: 100%; height: 150px; background: #000; color: #00ff00; font-family: monospace; padding: 10px; margin-top: 10px; }
        .btn { background: #d50a0a; color: white; border: none; padding: 12px 25px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .filter-box { margin-bottom: 20px; padding: 10px; width: 300px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Host Prediction Generator</h1>
        <p>Enter predictions. Search for your team (e.g., "CLE") to find specific picks.</p>
        
        <input type="text" id="filter" class="filter-box" placeholder="Search by Team (CLE, PIT, etc)..." onkeyup="filterPicks()">

        <div class="grid-header">
            <div>Pick</div><div>Team</div><div>Dave</div><div>Chris</div><div>Rob</div><div>Jan</div>
        </div>
        <div id="editor-container"></div>

        <div class="controls">
            <button class="btn" onclick="generateCode()">GENERATE JS CODE</button>
            <h3>Generated Code:</h3>
            <textarea id="output" readonly placeholder="The code will appear here..."></textarea>
        </div>
    </div>

    <script>
        const container = document.getElementById('editor-container');
        const order = window.DRAFT_ORDER_2026 || [];

        function init() {
            order.forEach(pick => {
                const row = document.createElement('div');
                row.className = 'pick-row';
                row.dataset.team = pick.team;
                row.innerHTML = `
                    <div>#${pick.overall}</div>
                    <div style="font-weight:bold; color:#ff3c00">${pick.team}</div>
                    <input type="text" class="p-input" data-pick="${pick.overall}" data-host="Dave">
                    <input type="text" class="p-input" data-pick="${pick.overall}" data-host="Chris">
                    <input type="text" class="p-input" data-pick="${pick.overall}" data-host="Rob">
                    <input type="text" class="p-input" data-pick="${pick.overall}" data-host="Jan">
                `;
                container.appendChild(row);
            });
        }

        function filterPicks() {
            const q = document.getElementById('filter').value.toUpperCase();
            document.querySelectorAll('.pick-row').forEach(row => {
                row.style.display = row.dataset.team.includes(q) ? 'grid' : 'none';
            });
        }

        function generateCode() {
            const picks = {};
            document.querySelectorAll('.p-input').forEach(input => {
                const val = input.value.trim();
                if (val) {
                    const id = 'pick-' + input.dataset.pick;
                    if (!picks[id]) picks[id] = {};
                    picks[id][input.dataset.host] = val;
                }
            });

            const output = `window.HOST_PICKS_2026_VERSION = 'v1-${Date.now()}';\n\nwindow.HOST_PICKS_2026 = ${JSON.stringify(picks, null, 4)};`;
            document.getElementById('output').value = output;
        }

        init();
    </script>
</body>
</html>
