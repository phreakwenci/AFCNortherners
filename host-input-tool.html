<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Host Prediction Entry Tool - AFC Northerners</title>
    <script src="draft-order-2026.js"></script>
    <script src="host-picks-2026.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #1a1a1a; color: white; }
        .pick-row { display: grid; grid-template-columns: 80px 150px 1fr 1fr 1fr 1fr; gap: 10px; margin-bottom: 5px; padding: 10px; background: #2d2d2d; align-items: center; }
        .header { font-weight: bold; background: #444; position: sticky; top: 0; z-index: 10; }
        input { background: #333; color: white; border: 1px solid #555; padding: 5px; width: 90%; }
        button { padding: 10px 20px; background: #d50a0a; color: white; border: none; cursor: pointer; font-weight: bold; margin: 20px 0; }
        textarea { width: 100%; height: 200px; background: #000; color: #0f0; font-family: monospace; }
        .controls { position: sticky; bottom: 0; background: #1a1a1a; padding: 20px; border-top: 1px solid #444; }
    </style>
</head>
<body>
    <h1>Host Prediction Input Tool</h1>
    <p>Fill out the picks below and click "Generate Code" at the bottom.</p>
    
    <div id="input-grid">
        <div class="pick-row header">
            <div>Pick #</div><div>Team</div><div>Dave</div><div>Chris</div><div>Rob</div><div>Jan</div>
        </div>
        <div id="rows-container"></div>
    </div>

    <div class="controls">
        <button onclick="generateCode()">GENERATE JS CODE</button>
        <h3>Copy this into host-picks-2026.js:</h3>
        <textarea id="output-code" readonly onclick="this.select()"></textarea>
    </div>

    <script>
        // Use the DRAFT_ORDER from draft-order-2026.js
        const container = document.getElementById('rows-container');
        const hosts = ['Dave', 'Chris', 'Rob', 'Jan'];
        const existingPicks = window.HOST_PICKS_2026 || {};

        // Build the UI
        window.DRAFT_ORDER.forEach(pick => {
            const row = document.createElement('div');
            row.className = 'pick-row';
            const pickKey = `pick-${pick.overall}`;
            const hostData = existingPicks[pickKey] || {};

            row.innerHTML = `
                <div>#${pick.overall}</div>
                <div>${pick.team}</div>
                ${hosts.map(h => `<input type="text" data-pick="${pick.overall}" data-host="${h}" value="${hostData[h] || ''}" placeholder="${h}'s pick...">`).join('')}
            `;
            container.appendChild(row);
        });

        function generateCode() {
            const results = {};
            const inputs = document.querySelectorAll('input[data-pick]');
            
            inputs.forEach(input => {
                const pickNum = input.dataset.pick;
                const host = input.dataset.host;
                const val = input.value.trim();
                
                if (val) {
                    if (!results[`pick-${pickNum}`]) results[`pick-${pickNum}`] = {};
                    results[`pick-${pickNum}`][host] = val;
                }
            });

            const code = `// OFFICIAL 2026 HOST PREDICTIONS - Generated ${new Date().toLocaleDateString()}\n` +
                         `window.HOST_PICKS_2026_VERSION = '${new Date().toISOString()}';\n\n` +
                         `window.HOST_PICKS_2026 = ${JSON.stringify(results, null, 4)};`;
            
            document.getElementById('output-code').value = code;
        }
    </script>
</body>
</html>
